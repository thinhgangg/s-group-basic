<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="game">
      <header>
        <h1 class="title">Memory Card Game</h1>
      </header>

      <div class="controls">
        <div class="stats">
          <span class="label">Moves:</span>
          <span id="moves-count" class="value">0</span>
        </div>
        <button id="restart-btn" class="btn primary">Restart Game</button>
      </div>

      <main id="board" class="board"></main>
    </div>

    <div id="win-modal" class="modal">
      <div class="modal-box">
        <h2 class="title">You Win!</h2>
        <p class="text">Congratulations! You've matched all the cards.</p>
        <div class="result">
          <div class="result-row">
            <span class="label">Total Moves:</span>
            <span id="final-moves" class="value">0</span>
          </div>
        </div>
        <button id="play-again-btn" class="btn success">Play Again</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
