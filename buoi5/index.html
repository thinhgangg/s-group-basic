<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Transform</h1>
      <div class="transform-container">
        <div class="box box-1">translate</div>
        <div class="box box-2">rotate</div>
        <div class="box box-3">scale</div>
        <div class="box box-4">combine</div>
      </div>

      <h2>Overlay effects</h2>
      <div class="overlay-container">
        <div class="card">
          <div class="overlay">Xem thêm</div>
          <img src="car1.jpg" alt="car" />
        </div>
        <div class="card">
          <div class="overlay">Chi tiết</div>
          <img src="car2.jpg" alt="car" />
        </div>
        <div class="card">
          <div class="overlay">Khám phá</div>
          <img src="car3.jpg" alt="car" />
        </div>
      </div>

      <h2>Keyframes</h2>
      <div class="keyframe-container">
        <div class="box box-1">bounce</div>
        <div class="box box-2">spin</div>
        <div class="box box-3">pulse</div>
        <div class="box box-4">slideIn</div>
      </div>

      <h2>CSS Loaders</h2>
      <div class="loader-container">
        <div class="spinner-loader"></div>

        <div class="dots-loader">
          <div class="dot dot-1"></div>
          <div class="dot dot-2"></div>
          <div class="dot dot-3"></div>
        </div>

        <div class="wave-loader">
          <div class="wave wave-1"></div>
          <div class="wave wave-2"></div>
          <div class="wave wave-3"></div>
          <div class="wave wave-4"></div>
          <div class="wave wave-5"></div>
        </div>
      </div>
    </div>
  </body>
</html>
