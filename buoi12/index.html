<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Game Dự Đoán Xúc Xắc</title>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
      }

      body {
        min-height: 100vh;
        background: #151515;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
      }

      .game-wrapper {
        width: 95%;
        max-width: 1000px;
        text-align: center;
      }

      h1 {
        margin-bottom: 20px;
        color: #f8d47a;
        letter-spacing: 1px;
      }

      .table {
        position: relative;
        width: 100%;
        min-height: 520px;
        background: radial-gradient(circle, #0f7a42, #064725);
        border: 18px solid #7a3f16;
        border-radius: 40px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
        padding: 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 25px;
      }

      .plate {
        width: 230px;
        height: 230px;
        background: radial-gradient(circle, #ffffff, #e8e1d5);
        border-radius: 50%;
        border: 6px solid #d7b46a;
        box-shadow:
          inset 0 0 25px rgba(0, 0, 0, 0.15),
          0 15px 25px rgba(0, 0, 0, 0.35);
        color: #222;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        cursor: pointer;
        transition: 0.25s;
        user-select: none;
      }

      .plate:hover {
        transform: translateY(-6px);
      }

      .plate.active {
        box-shadow:
          inset 0 0 25px rgba(0, 0, 0, 0.15),
          0 0 0 8px #f7c948,
          0 15px 25px rgba(0, 0, 0, 0.35);
      }

      .plate h2 {
        font-size: 42px;
        color: #9a6614;
        margin-bottom: 8px;
      }

      .plate p {
        font-size: 22px;
        font-weight: bold;
        color: #333;
      }

      .center-area {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
      }

      .bowl {
        width: 260px;
        height: 260px;
        background: radial-gradient(circle, #ffffff 45%, #ddd2c0);
        border-radius: 50%;
        border: 7px solid #d7b46a;
        box-shadow:
          inset 0 0 35px rgba(0, 0, 0, 0.18),
          0 18px 28px rgba(0, 0, 0, 0.4);
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        padding: 40px;
      }

      .dice {
        width: 62px;
        height: 62px;
        background: linear-gradient(135deg, #ffffff, #dcdcdc);
        border-radius: 12px;
        border: 2px solid #bbb;
        box-shadow: 0 5px 10px rgba(0, 0, 0, 0.25);
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(3, 1fr);
        padding: 8px;
      }

      .pip {
        width: 10px;
        height: 10px;
        background: #111;
        border-radius: 50%;
        justify-self: center;
        align-self: center;
      }

      .empty {
        width: 10px;
        height: 10px;
      }

      .controls {
        margin-top: 25px;
      }

      button {
        border: none;
        padding: 14px 34px;
        border-radius: 999px;
        background: #f7c948;
        color: #222;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.25s;
      }

      button:hover {
        background: #ffd86b;
        transform: translateY(-2px);
      }

      .info {
        margin-top: 16px;
        font-size: 20px;
        line-height: 1.8;
      }

      .result {
        color: #f8d47a;
        font-weight: bold;
        font-size: 24px;
      }

      .score {
        color: #5ee88f;
        font-weight: bold;
      }

      @media (max-width: 800px) {
        .table {
          flex-direction: column;
          padding: 30px 20px;
        }

        .plate {
          width: 200px;
          height: 200px;
        }

        .bowl {
          width: 230px;
          height: 230px;
        }
      }
    </style>
  </head>

  <body>
    <div class="game-wrapper">
      <h1>MINI GAME DỰ ĐOÁN XÚC XẮC</h1>

      <div class="table">
        <div class="plate" id="taiPlate" onclick="choose('tai')">
          <h2>TÀI</h2>
          <p>11 - 18</p>
        </div>

        <div class="center-area">
          <div class="bowl">
            <div class="dice" id="dice1"></div>
            <div class="dice" id="dice2"></div>
            <div class="dice" id="dice3"></div>
          </div>

          <button onclick="rollDice()">Lắc xúc xắc</button>

          <div class="info">
            <div>Bạn chọn: <span id="choiceText">Chưa chọn</span></div>
            <div>Tổng điểm: <span id="totalText">0</span></div>
            <div>Kết quả: <span class="result" id="resultText">---</span></div>
            <div>Điểm: <span class="score" id="scoreText">0</span></div>
          </div>
        </div>

        <div class="plate" id="xiuPlate" onclick="choose('xiu')">
          <h2>XỈU</h2>
          <p>3 - 10</p>
        </div>
      </div>
    </div>

    <script>
      let playerChoice = "";
      let score = 0;

      const diceMap = {
        1: [5],
        2: [1, 9],
        3: [1, 5, 9],
        4: [1, 3, 7, 9],
        5: [1, 3, 5, 7, 9],
        6: [1, 3, 4, 6, 7, 9],
      };

      function renderDice(elementId, number) {
        const dice = document.getElementById(elementId);
        dice.innerHTML = "";

        for (let i = 1; i <= 9; i++) {
          const dot = document.createElement("div");

          if (diceMap[number].includes(i)) {
            dot.className = "pip";
          } else {
            dot.className = "empty";
          }

          dice.appendChild(dot);
        }
      }

      function choose(choice) {
        playerChoice = choice;

        document.getElementById("taiPlate").classList.remove("active");
        document.getElementById("xiuPlate").classList.remove("active");

        if (choice === "tai") {
          document.getElementById("taiPlate").classList.add("active");
          document.getElementById("choiceText").textContent = "TÀI";
        } else {
          document.getElementById("xiuPlate").classList.add("active");
          document.getElementById("choiceText").textContent = "XỈU";
        }
      }

      function rollDice() {
        if (playerChoice === "") {
          alert("Bạn hãy chọn Tài hoặc Xỉu trước!");
          return;
        }

        const d1 = Math.floor(Math.random() * 6) + 1;
        const d2 = Math.floor(Math.random() * 6) + 1;
        const d3 = Math.floor(Math.random() * 6) + 1;

        renderDice("dice1", d1);
        renderDice("dice2", d2);
        renderDice("dice3", d3);

        const total = d1 + d2 + d3;
        const result = total >= 11 ? "tai" : "xiu";

        document.getElementById("totalText").textContent = total;
        document.getElementById("resultText").textContent =
          result === "tai" ? "TÀI" : "XỈU";

        if (playerChoice === result) {
          score += 10;
          document.getElementById("resultText").textContent += " - Bạn thắng!";
        } else {
          score -= 10;
          document.getElementById("resultText").textContent += " - Bạn thua!";
        }

        document.getElementById("scoreText").textContent = score;
      }

      renderDice("dice1", 1);
      renderDice("dice2", 2);
      renderDice("dice3", 3);
    </script>
  </body>
</html>
